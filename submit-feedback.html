<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pan.de.Kuko | Write A Review</title>
	<link rel="icon" type="image/png" href="assets/ui/favicon.png">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" type="text/css" href="css/about.css">
</head>
<body>
	<header class="nav-header">
		<a class="site-logo" href="index.html"><img src="assets/ui/site-logo.png" alt="pan de kuko logo"></a>
		<nav class="site-nav" aria-label="Primary">
			<ul class="nav-menu">
				<li><a href="our-kuko.html">Our Kuko</a></li>
				<li><a href="product.html">Order Form</a></li>
				<li><a href="about.html" class="is-current">About Us</a></li>
			</ul>
		</nav>
		<div class="nav-actions">
			<button class="login" type="button">Login/Register</button>
			<ul class="nav-icons">
				<li><a href=""><img src="assets/ui/cart-icon.png" alt="cart"></a></li>
				<li><a href=""><img src="assets/ui/bell-icon.png" alt="notifications"></a></li>
				<li><a href=""><img src="assets/ui/user-icon.png" alt="user account"></a></li>
			</ul>
		</div>
	</header>

	<main class="about-page submit-feedback-page">
		<section class="about-block">
			<div class="about-heading">
				<a href="feedback.html" class="about-back" aria-label="Back to Community Space">
					<span class="about-arrow"></span>
				</a>
				<h2>Write A Review</h2>
			</div>

			<div class="review-form-shell">
				<form class="review-form" enctype="multipart/form-data">
					<div class="review-top-row">
						<label class="review-input">
							<span class="sr-only">Subject Title</span>
							<input type="text" name="subject-title" placeholder="Subject Title:">
						</label>
						<div class="review-rating-box">
							<span class="review-rating-label">Rate Product:</span>
							<div class="review-stars" role="radiogroup" aria-label="Rate Product">
								<input type="radio" id="rating-5" name="product-rating" value="5">
								<label for="rating-5" aria-label="5 stars">&#9733;</label>
								<input type="radio" id="rating-4" name="product-rating" value="4">
								<label for="rating-4" aria-label="4 stars">&#9733;</label>
								<input type="radio" id="rating-3" name="product-rating" value="3">
								<label for="rating-3" aria-label="3 stars">&#9733;</label>
								<input type="radio" id="rating-2" name="product-rating" value="2">
								<label for="rating-2" aria-label="2 stars">&#9733;</label>
								<input type="radio" id="rating-1" name="product-rating" value="1">
								<label for="rating-1" aria-label="1 star">&#9733;</label>
							</div>
						</div>
					</div>
					<label class="review-textarea">
						<span class="sr-only">Review Message</span>
						<textarea name="review-message" placeholder="Tell us more about your experiences and share your thoughts about our product."></textarea>
					</label>
					<div class="review-actions">
						<input class="upload-input" type="file" id="review-photo" name="review-photo" accept="image/*">
						<label class="upload-button" for="review-photo">+ Add Photo</label>
						<input class="upload-input" type="file" id="review-video" name="review-video" accept="video/*">
						<label class="upload-button" for="review-video">+ Add Video</label>
						<button type="submit" class="submit-review">Submit Feedback</button>
					</div>
				</form>
			</div>
		</section>
	</main>

	<footer class="site-footer">
		<p class="footer-brand">pan.de.kuko</p>
		<p class="footer-copyright">pan de kuko &copy; 2026</p>
		<p class="footer-credit">Web Design by Czairyl Pascua</p>
		<ul class="footer-links" aria-label="Social and contact links"><li><a href=""><img src="assets/ui/instagram-icon.png" alt="Instagram"></a></li>
			<li><a href=""><img src="assets/ui/phone-icon.png" alt="Phone"></a></li>
			<li><a href=""><img src="assets/ui/mail-icon.png" alt="Email"></a></li>
		</ul>
	</footer>
	<script src="assets/js/site.js"></script>
</body>
</html>
